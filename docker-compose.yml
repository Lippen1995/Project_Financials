version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: projectx-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: projectx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data: